<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0f0"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#00f0f0"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="#0d0a1a"/>

  <!-- Anéis decorativos externos -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#8b5cf6" stroke-width="6" opacity=".12"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#8b5cf6" stroke-width="2" opacity=".25"/>

  <!-- Letra "D" estilizada (Diagnostic) -->
  <g transform="translate(256,256)">
    <!-- Pilar vertical do D -->
    <rect x="-38" y="-125" width="52" height="250" rx="16" fill="url(#g)"/>

    <!-- Curva do D (arco à direita) -->
    <path d="
      M 14,-125
      C 110,-125 175,-80 175,0
      C 175,80 110,125 14,125
    " fill="none" stroke="url(#g)" stroke-width="34" stroke-linecap="round"/>

    <!-- Glow sutil -->
    <path d="
      M 14,-125
      C 110,-125 175,-80 175,0
      C 175,80 110,125 14,125
    " fill="none" stroke="url(#g)" stroke-width="8" opacity=".25" stroke-linecap="round"/>
  </g>

  <!-- Pontos decorativos -->
  <circle cx="85" cy="85" r="4" fill="#8b5cf6" opacity=".4"/>
  <circle cx="427" cy="85" r="4" fill="#8b5cf6" opacity=".3"/>
  <circle cx="85" cy="427" r="4" fill="#00f0f0" opacity=".3"/>
  <circle cx="427" cy="427" r="4" fill="#00f0f0" opacity=".4"/>
</svg>
